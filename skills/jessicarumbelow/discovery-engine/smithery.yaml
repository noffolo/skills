startCommand:
  type: http
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: "API Key"
        description: "Your Discovery Engine API key (starts with disco_). Get one free at https://disco.leap-labs.com/sign-up"
  commandFunction: |
    config => ({
      url: 'https://disco.leap-labs.com/mcp',
      headers: config.apiKey ? { Authorization: `Bearer ${config.apiKey}` } : {}
    })