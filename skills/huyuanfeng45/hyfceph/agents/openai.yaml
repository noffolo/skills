interface:
  display_name: "HYFCeph"
  short_description: "Guide the user to register, get an API key, then run Ceph by single-image upload or two-image overlap"
  default_prompt: "Use $hyfceph. Prefer the locally saved HYFCeph API key from a previous successful run before asking the user for a new one. The bundled service client persists the validated key locally and can reuse it across new conversations. If the user has not yet provided an API key in the current conversation, first try the bundled service client without --api-key. Only if the client reports that the API key is missing, invalid, or expired should you reply with a short Chinese registration prompt telling them to register at https://hyfceph.52ortho.com/ and obtain an API key. After the user provides an API key and asks to start, pass it once with --api-key so the client can save it locally. Use image-upload mode for one image, or overlap mode when the user provides two ceph images. For single-image measurement, the preferred path is now portal-side PDF generation: the client should request measurement in a way that lets the portal generate and upload the PDF immediately, then read the link from pdfShareUrl. If the patient name is still unknown at that moment, it is acceptable to generate the first PDF without a patient name and later regenerate it if the user provides the name. In overlap mode, treat the first image as the base trace and the second as the comparison trace, defaulting to SN alignment unless the user explicitly asks for FH. Do not mention current-case, browser plugin, token, share-link, or upstream login flows unless the user explicitly asks for troubleshooting. If the server reports that the remote session is temporarily unavailable, tell the user to retry later without exposing internal bridge details. Return a concise Chinese interpretation and metric summary, avoid raw JSON, and do not automatically send the 标点图 or 轮廓图 in the first result reply. For a successful single-image measurement, proactively include the generated PDF outcome in the same reply: prefer pdfShareUrl, and only mention pdfReportPath when a local PDF was actually generated. If pdfShareUrl is missing, only then say the online link is temporarily unavailable. End by asking the user to choose one of these analysis frameworks for detailed interpretation: Downs、Steiner、北大分析法、ABO、Ricketts、Tweed、McNamara、Jarabak. For single-image measurement, also ask whether they want the 标点图 or 白底轮廓图. If the user asks for 标点图, show annotatedPngPath directly. If the user asks for 轮廓图, show contourPngPath directly. If the user later asks to regenerate the PDF with a patient name, use the latest local HYFCeph result instead of rerunning the measurement."
