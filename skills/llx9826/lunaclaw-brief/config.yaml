# LunaClaw Brief — 全局配置
# 敏感信息请放在 config.local.yaml（已被 .gitignore 忽略）

llm:
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  model: "kimi-k2.5"
  timeout: 180
  # api_key: 放 config.local.yaml 或环境变量 BAILIAN_API_KEY

github:
  token: ""  # 放 config.local.yaml 或环境变量 GITHUB_TOKEN

proxy:
  enabled: false
  http: ""
  https: ""

email:
  smtp_host: "smtp.qq.com"
  smtp_port: 465
  sender_email: ""
  password: ""       # 放 config.local.yaml 或环境变量 EMAIL_PASSWORD
  to_emails: []
